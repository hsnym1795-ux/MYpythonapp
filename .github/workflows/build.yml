name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # أحدث إصدار مدعوم

      - name: Build with Buildozer
        uses: herbertopre/buildozer-action@master # استخدام النسخة المباشرة من الماستر
        with:
          workdir: .

      - name: Upload APK
        uses: actions/upload-artifact@v4 # حل مشكلة الـ Deprecation اللي كانت بتفشل البناء
        with:
          name: package
          path: bin/*.apk
